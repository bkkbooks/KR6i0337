body:
  text: 於自覺非分故說無因故外道無有常性大慧若復諸外道因相成常不思議將片彼常若諸外道因無常已成常者此縱彼義因自相非性同於菟角此舉法喻而片明彼妄立因相本無體性類於兔角此常不思議但言說妄想明此外計但唯言妄故同兔角諸外道輩有如是過明彼外道但有妄說之患所以者何此徵所以謂但言妄想同於兔角自因相非分此即釋也明彼外人但有言妄同兔角故於自覺因相彼非其分大慧我常不思議因自覺得相故自下顯正明佛真常因於本心自覺得相離所作性非性故常釋上常義離於所作有無性故名之為常非外性非性無常思量計常不同外道思量取計大慧若復外性非性無常思量計常不思議常若計外性無已思量為常者此即牒計而彼不知常不思議自因之相片彼不知真不思議自因之相去得自覺聖智境界相遠彼不應說初明訶責明彼去自覺彌遠不應說有常不思議復次大慧畏生死妄想苦而求涅槃四對愚智優劣以明正智此敘愚見謂畏生死苦求涅槃樂不知生死涅槃差別一切性妄想非性釋其所由彼人猒苦求樂者以不了生死涅槃及差別諸法悉是妄想本來非性未來諸根境界休息作涅槃想以不了故妄計未來根境滅已作涅槃想非自覺聖智趣藏識轉然大乘以自覺藏轉而為涅槃小乘未悟故言非也是故凡愚說有三乘明立教所由以根器不同是故佛為凡愚說三乘教說心量趣無所有明彼三乘性人並是心量者為令趣入無所有故下云住於無所有何建立三乘是故大慧彼不知過去未來現在諸如來自心現境界明彼小根不知三世如來真心現境以為涅槃計著外心現境界生死輪常轉遂計心外現境識浪無窮故云常轉復次大慧一切法不生下明辨正前起生死涅槃等見為斥彼故言諸法不生是過去未來現在諸如來所說明化跡雖殊證道所說曾無有異所以者何徵諸法不生者何謂自心現性非性離有非有生故此釋也謂了自心現本來非性則離有無二種生見故言不生大慧一切性不生下再明不生此先標也一切法如兔馬等角喻兔馬等角既本自不有後亦不無不生亦爾愚癡凡夫不實妄想自性妄想故今舉生見以明不生但凡愚不實妄計生滅實無生大慧一切法不生自覺聖智趣境界者又明不生是自覺趣境此句該通上下一切性自性相不生若自覺趣者知一切法性自不生此即該下非彼愚夫妄想二境界自性明不生之道非愚下二見所知身財建立趣自性相明凡下計依正兩報二見因此而興大慧藏識攝所攝相轉愚夫墮生住滅二見希望一切性生今明二見起之所由謂依藏識微習轉故則有能所二見之患諸見起由自茲而生有非有妄想生非聖賢也夫有無二見從妄而生非是聖賢有如斯過大慧於彼應當修學此結勸修復次大慧有五無間種性五約五性以驗於機明其正智此即初標答上云何為種性等云何為五明其徵數謂聲聞乘無間種性三明列名此列初性謂聞聲教乘以修行不雜餘乘故名無間習見不易生於後果故名種性緣覺乘無間種性有其二種一出無佛世覩緣而悟二遇佛演說十二因緣依以受行亦招來報義例同前如來乘無間種性乘一如道至成種覺名曰如來所乘之法即悲智兼濟餘准於上不定種性於三乘法未有定種隨說而入習必剋成三性具含故言不定各別種性外道之人隨情異執目為各別云何知聲聞乘無間種性自下徵釋將釋初性此即先徵夫小乘性云何得知若聞說得陰界入自共相斷自下釋也以教驗方知若諸修行聞斷陰入自共相身得涅槃者知時彼聞前說如是知時舉身毛孔凞怡欣悅聞上說已遍體毛孔悉皆歡喜驗有此相必由久習此該下文凞怡和悅之㒵以慶今得遇及樂修相智不修緣起發悟之相明小乘人但習四諦謂知苦斷集證滅修道存物而見故言相智不同中乘依緣發悟是名聲聞乘無間種性此總結也上並舉因而驗方知有性聲聞無間見第八地自下舉果而驗言第八者謂阿羅漢四果四向至阿羅漢便當第八起煩惱斷習煩惱不斷明羅漢斷或分齊但伏三界現行煩惱未斷習使如舍利弗吐食等斯之證也不度不思議變易死度分段死明離苦有異以未斷習故感變易生伏現惑故離分段死謂微妙四大之形念念易劣而變勝非凡所測名不思議然羅漢辟支住地所感粗妙有殊又三界漏形壽報限分故名分段正師子吼我生已盡梵行已立不受後有舉聲聞獲四智究竟魔外道中無畏而說名師子吼我生已盡知苦智梵行已立道已修智不受後有集已斷智闕所作已辦梵本如是如實知明二乘所知四智決定不疑故言如實修習人無我乃至得般涅槃覺又修人空無漏獲於涅槃生滅度想故名為覺若修行人聞之所說發悟相生即驗其人是聲聞性大慧各別無間者次釋第五各別種性此即初牒問何故文不次邪為欲前齊聲聞後該緣覺故爾我人衆生壽命長養士夫彼諸衆生作如是覺求般涅槃明外人計我以求涅槃施身自謂名之為我約用稱人衆法和合名曰衆生報有限分色心連持名曰壽命飲食所資以為長養堪任於事名曰士夫上之六種並我之異稱但存我別求悉名外道復有異外道說悉由作者見一切性已言此是般涅槃有異外道計自在等以為作者諸法悉滅言此自在而為涅槃作如是覺法無我見非分此句結上二人若結小乘法字屬下若結外道即法字屬上此法之一字該通上下彼無無解脫明彼小乘無法空解脫又彼外道無人空解脫大慧此諸聲聞乘無間外道種性不出出覺此總明上兩人俱不出人法現習而作出解為轉彼惡見故應當修學今總結勸學大慧緣覺乘無間種性者三釋緣覺乘性此即初牒若聞說各別緣無間謂所聞法緣有十二名為各別繫念修行餘乘不雜故言無間舉身毛竪悲泣流淚此明中乘發悟之相所以悲者謂傷昔不聞不相近緣所有不著此聞已獲益謂悟緣空則無相近於諸世間不生計著上並舉因而驗其性種種自身種種神通自下舉果驗機夫緣覺之人若化衆生但現神通或殊形等已或變化無窮若離若合或離一身為多或合多身為一種種變化或吸風納火摩捫日月轉換地水如是等類巧設異端聞說是時其心隨入聞上所說神通變化當知久習緣覺乘性若知彼緣覺乘無間種性已隨順為說緣覺之乘若知彼性應隨順說令易受入速獲益故是名緣覺乘無間種性相此總結示大慧彼如來乘無間種性有四種四明如來乘性舉勝策修此即初標謂自性法無間種性舉一切法離自性法無間種性明諸法性空合明所證之理得自覺聖無間種性此明能證之智上明自利外剎殊勝無間種性此明利他修於淨土悲濟有情此總明悲智體唯一大慧若聞此四事一一說時此牒聞說之際及說自心現身財建立不思議境界時心不驚怖者及聞說心境依正三報即事即如非思議境不生驚怖當知久習如來乘性是名如來乘無間種性第三略結是名如來乘無間種性相總結內心契證名為種性聞而不怖故名為相大慧不定種性者五明不定此即初牒謂說彼三種時隨說而入隨彼而成下明廣釋隨說便悟依學必成其性可移故言不定大慧此是初治地者此下不定如治於地未下種子此初治三業未下三乘種故謂種性建立既三乘俱入應以佛乘種性而建立之為超入無所有地故作是建立釋建立之意為超七地入於八地無功用故彼自覺藏者自煩惱習淨見法無我明無所有地謂覺藏心現習俱淨二障悉除見二無我名無所有得三昧樂住聲聞當得如來最勝之身此會昔權說住寂聲聞不得作佛今依大教畢定當成此舉聲聞意該餘四爾時世尊欲重宣此義而說偈言須陀槃那果梵云窣嚕多此云流梵云槃那此云入具言入流此牒初果往來及不還往來牒第二果人天一往來生不還牒第三果欲界惑盡生於天上不來人間故言不還逮得阿羅漢此牒第四及得羅漢是等心惑亂此句總破明上四果不離心量故言惑亂三乘與一乘非乘我所說明三一俱權佛之所說然三約一設一對三施三既不存一亦非有愚夫少智慧諸聖遠離寂明迷悟所由以愚夫少慧起三一見諸聖遠之會於本寂此乃非一之一第一義法門遠離於二教住於無所有何建立三乘明第一義心本非漸頓若修行者住無所有真實之心何有三乘可立諸禪無量等此牒四禪四無量心無色三摩提牒無色界四空處定受想悉寂滅牒滅受想定亦無有心量此句總破彼實無有但心量耳大慧彼一闡提三約闡提以明如如於中有二初總次別今就總中彼一闡提者指彼昔教斷滅善根無信善者答上問中云何一闡提非一闡提此總非也明如實之理聖凡等有猒惡生死欣求涅槃善根既生故言非世間解脫誰轉第三反釋若闡提人定不成佛誰轉生死染法而得解脫既有可轉故知闡提非也大慧一闡提有二種今明別釋廣開前義此即總標一者捨一切善根及於無始衆生發願此即列也斷諸善品及執小謗大名捨善根二者發弘誓願不取寂證云何捨一切善根將釋捨善根人此即初徵謂謗菩薩藏及作惡言自下釋也捨善根人謂於大乘滿字菩薩藏中心懷不信故口發惡言此非隨順修多羅毗尼解脫之說然隨順大乘三藏學處此人非撥下信名為闡提梵云素怛囉謂詮定學毗奈邪詮戒學阿毗達摩謂詮慧學今言解脫即是慧也捨一切善根故不般涅槃此即結也由捨善根不得涅槃名為闡提二者菩薩本自願方便故次明本願方便誓化衆生不取涅槃亦同闡提此明標舉非不般涅槃一切衆生而般涅槃此明反釋舉其本願總為一句要令衆生般涅槃已然始涅槃成佛未期故名闡提大慧彼般涅槃是名不般涅槃法相約願而釋彼令衆生般涅槃已方取證者齊不得涅槃之義此亦到一闡提趣若爾者此之菩薩亦同闡提之義大慧白佛言世尊此中云何畢竟不般涅槃次明料簡此初徵問有其兩意此先徵菩薩云何畢竟不得涅槃佛告大慧菩薩一闡提者自下答中將明非闡提義故此先牒知一切法本來般涅槃已畢竟不般涅槃而非捨一切善根一闡提也此正明非義約願狀同據行即非然以菩薩知諸法寂滅體即涅槃更不別求故言不般豈同邪斷之人大慧捨一切善根一闡提者次欲明邪見之人非闡提義故此先牒宜牒上問文勢易顯復以如來神力故或時善根生自下釋邪斷之人以佛本願加持力故於六趣中或今後世令善根還生故不名一闡提也所以者何假問徵起謂如來不捨一切衆生故以佛本願誓於衆生大悲無捨故以是故菩薩一闡提不般涅槃此一句結上菩薩闡提今置之在末者梵本例然復次大慧菩薩摩訶薩當善三自性自此已下答自性經此初標勸者令窮三性之妙故言當善云何三自性次明徵數謂妄想自性三明列名謂內外諸法從虗妄有故言妄想緣起自性妄計體性假因緣而生故云緣起成自性謂離緣妄聖智所行圓滿無缺故云成性大慧妄想自性從相生自下略釋妄無體性依相而生大慧白佛言世尊云何妄想自性從相生下明廣釋此初徵問以何故說妄想自性從相而生佛告大慧緣起自性事相相行顯現事相相自下佛答先明所從之相即內外緣起妄依此生今言緣起自性者謂瓶等外緣行顯現者陰等內緣以從心行所現故此等內外各有名相事相故言相相然妄心所緣不出此二故先舉之計著有二種妄想自性如來應供等正覺之所建立自下明能從妄想由計所緣境故即有二種妄想而生如來正覺建立而說謂名相計著相及事相計著相此明列也明名事二相依計著故生名相計著相者三明牒釋此先牒初謂內外法計著夫名相者依內外計著而生事相計著相者此牒第二謂即彼如是內外自共相計著謂依彼內外事相而生計著是名二種妄想自性相此則總結若依若緣生次釋緣起謂依者因也明因緣所生悉名緣起是名緣起結示可知云何成自性三釋成性此初徵名謂離名相事相妄想聖智所得無別成性離妄得名道既惟微聖智方證也及自覺聖智趣所行境界此辨成性謂自覺聖趣離念之境乃成性之義是名成自性如來藏心三結成性亦曰藏心爾時世尊欲重宣此義而說偈言名相覺想自性二相正智如如是則成相次偈頌明五法三性互相收攝謂五法中名相覺想即三性中緣妄二相正智如如即五法中二是即成相三性中一大慧是名觀察五法自性相經自覺聖智趣所行境界今此總結明五法等是自覺聖智所修行境汝等諸菩薩摩訶薩應當修學此則勸修復次大慧菩薩摩訶薩善觀二種無我相三明二無我答上問中何等二無我今欲發明勝義故初標勸了我即無我故曰善觀故經云於我無我而不二云何二種無我相假問徵起謂人無我及法無我人即主宰法即五陰陰中無主稱曰人空了陰即空名法無我此二相依故斯雙列云何人無我自下廣釋先明人空此即初徵謂離我我所陰界入聚夫虗妄人見本由迷法今還約法以明非有我即是人我所是法二見齊觀照本性空故云離無知業愛生次窮陰因從業愛等起眼色等攝受計著生識復窮無明從眼等諸根色等諸塵能所攝受六識計著而生以梵言多倒故云生識一切諸根自心現器身藏自妄想相施設顯示今總明根塵依正等報並自妄心假施顯示即知上來我所業愛相緣而生從本已來性相空寂則我所何有我既非有無我亦云則人空之義今言一切諸根即六根也自心現即六塵也器謂依報身即正報並從藏識而現故知自妄施設顯示上約法以明人空如河流如種子如燈如風如雲剎那展轉壞躁動如猿猴自下約喻舉五觀門以明無我此舉無常門夫我謂常義今既無常故無有我文標六喻上五喻身下一喻心如水奔流種牙變易燈籍衆緣飄風不住浮雲起滅上來諸喻剎那變壞此身亦爾豈有常邪又心之躁動等若猿猴既不能令身心常住我義焉在樂不淨處如飛蠅第二舉不淨門明其無我然一切世間貪樂此身不淨之聚卅六物穢惡之軀如彼飛蠅玩於臰處我是淨義故知無我無猒足如風火三舉苦門以明無我我者樂義今貪欲無猒如風中之火逢薪轉熾追求不得為苦所惱既無有樂故知無我無始虗僞習氣因如汲水輪第四舉不自在門以明無我一切衆生為無始虗僞習業所繫往來三界如汲井輪循環不息為愛水故溉灌業田即業因所推故無有我也生死趣有輪法合以生死六趣三有流轉故說為輪種種身色幻術神呪機發像起善彼相知五舉空門以明無我然諸衆生雖有身色相貌宛然以三喻驗之空花不異如幻化人神呪起死機關木人雖若云為實非我是名人無我智向以法喻推折即體皆空辨述既周故此結示云何法無我智次明法空故此先徵謂覺陰界入妄想相自性第三廣釋謂覺陰入但妄計自性本來非有即法空義如陰界入離我我所陰界入積聚因業愛繩縛展轉相緣生無動搖自下舉陰欲例餘法如前所知陰非我所窮其本也乃妄業為因展轉而有因緣生法體即不生既性自不生故無動搖故法句經云從緣無起作本來無所動諸法亦爾離自共相不實妄想相今例該萬法義齊於陰本無所動自共相境及不實妄想性自離故妄想力故是凡夫生非聖賢也此分凡聖凡則妄想聖則不然為今修行捨凡從聖心意識五法自性離故釋上聖見捨離四種對治教門大慧菩薩摩訶薩當善分別一切法無我總舉勸觀善法無我菩薩摩訶薩不久當得初地自下廣明觀益如前所說通達二空知理平等即為初地所證不遙故云不久菩薩無所有觀地相釋初地相明修行者達一切法悉無所有名初地觀相觀察開覺歡喜明初地益相又釋得名所由往在有纏沉淪結縛今悟心性本無所有纍漏斯云昔所未得而今始得生大喜悅名為歡喜次第漸進超九地相得法雲地既入初地乘茲一道清淨之心漸次增明能超第九獲法雲地於彼建立無量寶莊嚴大寶蓮華王像大寶宮殿明十地之報以彼菩薩證十地時感無量大寶莊嚴大蓮華座上有大寶宮殿裏有寶師子座此事具如華嚴經第草八所明幻自性境界修習生於彼而坐此釋所由謂此菩薩往昔修行一切諸法如幻如夢空慧所成其身姝妙可於華座同一像類諸最勝子眷屬圍繞明獲此益亦以十地菩薩眷屬圍繞從一切佛剎來佛手灌頂時彼菩薩升座之時十方諸佛遙伸其手灌摩頭頂如轉輪聖王太子灌頂此明舉喻猶彼輪王授太子位令灌頂師以水灌頂等無有異超佛子地到自覺聖法趣明此菩薩超於十地到如來自覺聖趣行德圓滿當得如來自在法身明入佛位證會法身見法無我故釋其所以上之勝益由見法空致使如是是名法無我相三明結示汝等諸菩薩摩訶薩應當修學此總勸修爾時大慧菩薩摩訶薩復白佛言世尊建立誹謗相唯願說之今明立謗乃有無之類以前文明我即無我恐捨有取無墮於二見故重料簡答上問中云何建立相及與非我義此初問中標宗而請令我及諸菩薩摩訶薩離建立誹謗二邊惡見次舉益中明其離妄疾得阿耨多羅三藐三菩提按正梵云頞耨怛㘕此云無上三藐此云正三名為等勃陀稱覺諸佛正等覺非三乘境故云無上此由離見獲斯勝果覺已離常建立斷誹謗見不謗正法此結益相獲正覺已離斯二見圓證法身故云不謗爾時世尊受大慧菩薩請已而說偈言為生前後問答經家敘述建立及誹謗無有彼心量自下先明偈答此明立謗本無但彼心量身受用建立及心不能知此明立謗以心迷依正生茲二見愚癡無智慧建立及誹謗此結二見起由以愚無智慧墮於二見爾時世尊於此偈義復重顯示告大慧言自下長行廣釋前義此經家生起有四種非有有建立先明建立此則初標云何為四所謂徵起謂非有相建立非有見建立非有因建立非有性建立此列四名謂非有相見因性之中而橫立也是名四種建立略結顯示又誹謗者次辨誹謗之中此初標牒謂於彼所立無所得觀察非分而起誹謗次釋謂先計為有後滅為無而生誹謗是名建立誹謗相雙明結示復次大慧云何非有相建立相自下釋前四種建立此先明徵起非有相也謂陰界入非有自共相而起計著自下釋也謂陰界入本來非有而妄生計著此如是此不異此則總破謂指前如是陰等畢竟體空曾無有異是名非有相建立相此明結示此非有相建立妄想無始虗僞過種種習氣計著生此非有相但從無始過習而生重明結示大慧非有見建立相者次明非有見中此亦初牒若彼如是陰界入我人衆生壽命長養士夫見建立次釋妄於陰等計有我人等性有所知見實自非有是名非有見建立相第三結示大慧非有因建立相者三明非有因中此亦初牒謂初識次釋也謂小乘計識初受胎攬父母精血為受生之始計以為因若據大乘以第八藏心習種所依計為生本此明敘計無因生此明破辭謂本無有因何所從生後不實如幻前因既無後果何實本不生上所計因者本自不生此總結眼色明界念前生生已實已還壞前破因無自起今片緣非共生假令計眼等五緣為生之方便者然此所生未離生滅有何體性言生已生相實已住相還壞滅相是名非有因建立相此結示也大慧非有性建立相者四釋非有性中此初牒也謂虗空滅般涅槃非作計性建立次敘見也謂計空非擇滅及以涅槃此三非作名曰無為執有體性存之為實此外道小乘通作斯計此離性非性一句總片明上所見本非有無但妄計耳一切法如菟馬等角以喻曉之明於諸法如兔馬等角本自不有今非不無況前所計離性非性如垂髮現言垂髮非有由翳目而生法亦復爾離有非有建立及誹謗此合上兔馬角喻愚夫妄想不善觀察自心現量非聖賢也此合上垂髮愚妄所見非諸賢聖是名非有性建立相結亦可知是故離建立誹謗惡見應當修學總結離見以勸修行復次大慧菩薩摩訶薩心意意識五法自性二無我相趣究竟第二明四門之意夫教之所設為自趣究竟及安樂衆生自利利他傳燈之義此初總標明其自益為安衆生故作種種類像今明利他為安群品作種種形隨應而說如妄想自性處依於緣起此喻明化意如彼妄性依緣起生明諸佛化身應機而現譬如衆色如意寶珠此重顯前喻寶珠無心而隨色變表法身非相物感則形普現一切諸佛剎土一切如來大衆集會自下法說明佛以大悲普現諸剎示作佛身亦有菩薩聲聞八部圍繞悉於其中聽受經法隨所化處復有受化之徒聽受經法所謂一切法如幻如夢光影水月明所聞法於一切法離生滅斷常及離聲聞緣覺之法此明聞說如幻夢等能離外道二乘人法等見得百千三昧乃至百千億那由他三昧自下明以聞教故復獲初地乃至七地已上那由他定得三昧已遊諸佛剎供養諸佛既獲三昧能遊佛剎供養諸佛聽受未聞生諸天宮宣揚三寶示現佛身明此菩薩非但歷供咨受復生天宮讚三寶現佛身聲聞菩薩大衆圍繞明所現佛身亦有衆所圍繞以自心現量度脫衆生明佛所說以覺自心現度諸衆生分別演說外性無性又為衆生說外無性悉令遠離有無等見為令受化離二邊見爾時世尊欲重宣此義而說偈言心量世間佛子觀察但有心量名曰世間勸諸佛子當善觀察種類之身離所作行應若摩尼無思而發得力神通自在成就明所起化身由獲力通自在成就也爾時大慧菩薩摩訶薩復請佛言唯願世尊為我等說一切法空無生無二離自性相自下舉空無生等者為顯上四門至趣此標宗請遠酬上云何空何因今所言空明前五法非有離性即三性體空無二即二我兩亡無生欲明八識不起我等及餘諸菩薩衆覺悟是空無生無二離自性相已離有無妄想自下舉益此明離妄疾得阿耨多羅三藐三菩提明其獲果爾時世尊告大慧菩薩摩訶薩言諦聽諦聽善思念之今當為汝廣分別說下明佛將酬答必先飭三慧後乃答之諦聽者聞慧善思謂思慧念之即修慧大慧白佛言善哉世尊唯然受教次明大慧既蒙佛誡許故敬而飭唯翼水反者敬譍之辭恭於諾也佛告大慧空空者自下廣釋此明總答謂初牒空門意說餘三今重牒空者上空即指其前問下空乃是牒辭即是妄想自性處此釋空之體性只道妄計有處即是其空更無別理餘門例然大慧妄想自性計著者說空無生無二離自性相次明說空等四門之意良以妄計有者故說於空餘三准此大慧彼略說七種空上已總答兩問下別釋空等四門今先釋空門此初標也然諸經辨空自有增減今經雖略其義不殊謂相空性自性空行空無行空一切法離言說空第一義聖智大空彼彼空次列七名云何相空第三牒釋初徵相空謂一切性自共相空此明釋也謂一切諸法自共相空此略標釋觀展轉積聚故分別無性自共相不生夫緣起之法假積而成既了無性故自共非有自他俱性無性故相不住所言相者皆從三合而生今了自之與他俱亦無性相依何住是故說一切性相空第三合也是名相空第四結也云何性自性空將明性空此亦初徵謂自己性自性不生上觀總相不有今觀別性亦無故言自己性不生也是名一切法性自性空此亦合也是故說性自性空總結可知云何行空三釋行空此亦初徵謂陰離我我所次釋行謂五陰陰行既空故我所非有因所成所作業方便生前推陰果今乃窮因夫言陰果要因無明愛業招感無明既無體性業果依何而生因果兩亡故行無所有是名行空此結示也大慧即此如是行空展轉緣起自性無性是名無行空次明無行亦空對有行生死說無行涅槃窮行既其不有豈有無行可存云何一切法離言說空今明第五此即初徵謂妄想自性無言說故一切法離言說次釋也明妄為言本言由妄生既了妄性空故言說非有故諸法離言是名一切法離言說空三結示也云何一切法第一義聖智大空六明義空此亦初徵謂得自覺聖智一切見過習氣空次即釋也謂得自悟之智了若目前現習既亡故物無不寂是知諸法即第一義是名一切法第一義聖智大空三結顯示云何彼彼空自下釋第七此即初徵謂二法相望更遞為彼故言彼彼謂於彼無彼空是名彼彼空次約法而釋謂此無彼物彼無此物各闕一邊互執興見大慧譬如鹿子母舍無象馬牛羊等非無比丘衆而說彼空自下喻說鹿子人名其母即毗舍法優婆姨深重三寶造立精舍安止比丘於中無象馬諸畜約此名空非舍舍性空亦非比丘比丘性空此反明之非無精舍及以比丘而說為空但無象馬說為空耳非餘處無象馬此明餘家但有象馬而無比丘故說為空是名一切法自相彼自下法合明一切諸法更遞相彼於彼無彼是名彼彼空更相無故名為彼彼是名七種空總結上七種空義彼彼空者是空最粗汝當遠尊欲重宣此義而說偈言我常說空法遠離於斷常自下兩偈頌上四門此二句頌初空門明佛說畢竟空義性離斷常生死如幻夢而彼業不壞此二句頌無生門明五陰如幻本來非實又言彼業不壞欲明性自無成總約苦集以明無生虗空及涅槃滅二亦如是此兩句頌無二門舉二乘外道三種無為明一切二邊亦皆如是愚夫作妄想諸聖離有無此二句頌離自性門謂愚夫妄想執為自性諸聖既離熟為有無爾時世尊復告大慧菩薩摩訶薩言大慧空無生無二離自性相普入諸佛一切修多羅凡所有經悉說此義自下明空等四義貫入衆經無有一法不含斯理諸修多羅悉隨衆生希望心故為分別說顯示其義而非真實在於言說自下會權歸實而諸經有不說空等門者但以希望不一樂欲有殊故佛應機遂教門差別而真實在乎心悟不在文言如鹿渴想誑惑群鹿鹿於彼相計著水性而彼無水此舉喻如彼群鹿被渴想所誑妄見陽𦦨謂之為水而實非水一切衆生為妄心所惑取文字為真莫能自反如是一切修多羅所說諸法為令愚夫發歡喜故非實聖智在於言說此明法合然文言所辨為令愚夫發於欣樂而真實聖智逈出名言是故當依於義莫著言說勸依實義不著文字爾時大慧菩薩摩訶薩白佛言世尊世尊修多羅說如來藏自性清清轉卅二相入於一切衆生身中自下辨如來藏者意有多種一殊外道二會權實三明說有不乖於空此初問中牒於昔教謂如來藏性本自清淨具佛相好備在衆生約因說果稱為轉入如大價寶垢衣所纏前法次喻如大價金寶垢服所纏衆覩棄之莫能尊重如來之藏常住不變亦復如是合上大寶而陰界入垢衣所纏貪欲恚癡不實妄想塵勞所汙此舉陰等三毒妄想塵勞合上垢衣所纏一切諸佛之所演說明上之所說非獨釋迦乃諸佛同說此都結有藏非謬云何世尊同外道說我言有如來藏邪第二正難如來說藏與外道不殊世尊外道亦說有常作者離於求那周遍不滅此釋同外道我之所由謂外道計我其義有三一者體常名為作者二者雖在五陰而離於求那三者遍歷諸趣實非生滅佛今說藏義亦如之謂藏性清淨能興造趣生雖處穢纏不為所染復性非為作而物無不周然則藏我名殊所計非異故招斯難世尊彼說有我此之一句雖結外道說我意明藏義是同佛告大慧我說如來藏不同外道所說之我自下佛答此即先標總明不同外說大慧有時說空無相無願自下廣明不同所以略述藏義有一十二名此舉三空三句即藏之異字外道說我則不如是如無二無別故實際諸邊不動故法性理無變易故法身淨法聚故涅槃離生死故離自性非所有故不生不滅本不然故本來寂靜絶喧動故自性涅槃體圓寂故如是等句說如來藏已此總結上來諸句說藏者斯乃一體應物異名豈同外道立其定分上來略明不同外道之說如來應供等正覺為斷愚夫畏無我句故說離妄想無所有境界如來藏門此第二明說藏之意良以外道執有怖於無我然佛為誘化故隱彼空名假說於藏大慧未來現在菩薩摩訶薩不應作我見計著此結勸今後修行聞斯說藏不應同我見而計譬如陶家於一泥聚以人功水木輪繩方便作種種器此喻及合廣明前說藏不同外道所由說藏等異名者並應物施作如彼陶師於一聚泥隨前人所須造作衆器等無差別鍊土作器故名為陶如來亦復如是合前陶家於法無我離一切妄想相合前泥聚以種種智慧善巧方便合前以人功等或說如來藏或說無我合前作種種器以是因緣故說如來藏不同外道所說之我此釋不同所說所由是名說如來藏此明結示上來總明不同外說開引計我諸外道故說如來藏自下重明說藏之意佛昔一時入池洗浴有諸外道咸作是言我觀瞿曇實一切智以所演義多說虗空故我不能依其受學然佛知彼等道機將熟開引計我故說於藏此舉昔說藏之所以斯乃說空為藏今昔豈有相違令離不實我見妄想自下明佛說藏有其三意此即初令離妄我故入三解脫門境界次入三脫修善品故希望疾得阿耨多羅三藐三菩提第三冀疾獲證大菩提故是故如來應供等正覺作如是說如來之藏若不如是則同外道此結說藏若不爾者則同外計是故大慧為離外道見故當依無我如來之藏此總結勸捨邪依正爾時世尊欲重宣此義而說偈言人相續陰外道所計由我人等令陰相續緣與微塵又計微塵等與生法為緣勝自在作或計一切悉是勝妙自在天之所作也心量妄想此句總片並心妄想此但頌外計反之為正矣
