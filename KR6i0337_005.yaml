body:
  text: 大敬愛寺沙門智嚴注爾時大慧菩薩復白佛言世尊唯願為我及諸菩薩說宗通相此初標請宗通之相若善分別宗通相者我及諸菩薩通達是相次舉通法之益通是相已速成阿耨多羅三藐三菩提明得果不隨覺想及衆魔外道以了宗通不隨妄想及邪魔等見佛告大慧諦聽諦聽善思念之當為汝說飭聽許說大慧白佛言唯然受教敬而受飭佛告大慧一切聲聞緣覺菩薩有二種通相將明廣答此約人標數謂宗通及說通次列宗謂聖趣說明權濟大慧宗通者先初牒宗謂緣自得勝進相次釋宗繫心內悟漸次增明故云勝進遠離言說文字妄想證之道體離言字及妄想者謂言語道斷心行處滅趣無漏界自覺地證入法身現習俱淨名漏界此即如來自覺之自相遠離一切虗妄覺想明自得境從本已來性離虗妄降伏一切外道衆魔以此一實之道超過諸見故能降衆魔伏外道緣自覺趣光明輝發明自覺聖趣發知慧暉假使名壁莫之能礙是名宗通相總結如實虗融廓然無擁可謂宗矣云何說通相徵說之相謂說九部種種教法離異不異有無等相次釋說通謂大小二乘九部教典其中名數如餘經所明然聖教至趣體離一異有無四句之相以巧方便隨順衆生如應說法令得度脫然聖人以無住巧便應機開演各令獲益亡乎我所而利物靡窮即說通之義是名說通相三明結示大慧汝及餘菩薩應當修學此結勸修學爾時世尊欲重宣此義而說偈言宗及說通相緣自與教法此標宗說名義若見善分別不隨諸覺想了達宗說即不隨妄覺此之一偈總頌二通非有真實性如愚夫妄想明有無非實如愚之妄計頌上謂有世間云何起欲想非性為解脫此訶何故於有起欲又取彼非性為解脫哉觀察諸有為生滅等相續增長於二見顛倒無所知凡觀有為起生滅二見者斯由無知所起一是為真諦無罪為涅槃觀察世妄想如幻夢芭蕉了一諦涅槃則觀世如幻本來不實頌上性相寂靜雖有貪恚癡而實無有人從愛生諸陰有皆如幻夢明貪恚妄有實無有人假使從愛起陰皆如幻夢爾時大慧菩薩白佛言世尊唯願為說不實妄想相自下約二諦平等顯上宗義此先請不實妄想之相不實妄想云何而生次問不實妄想之所生說何等法名不實妄想三問不實妄想之體於何等法中不實妄想四問不實妄想之所起佛告大慧善哉善哉能問如來如是之義多所饒益多所安樂哀愍世間一切天人今佛先讚諸者以所問意利樂廣多故斯嘆美諦聽諦聽善思念之當為汝說次明飭許大慧白佛言善哉世尊唯然受教敬讚受飭佛告大慧種種義種種不實妄想自下佛答明外五塵義體無實事此酬初問妄想之相計著妄想生由計外境即妄想隨生答上第二問妄之所生大慧攝所攝計著不知自心現量及墮有無現增長外道見以能所計故不知心量墮於有無增長外見答上第三問妄想之體妄想習氣計著外種種義心心數妄想計著我我所生夫妄想所起因於習氣計諸塵義復由心數計我所而生此答上第四問妄想所起大慧白佛言世尊若種種義種種不實妄想自下大慧將欲興難牒前所答今即牒佛之初答不實之相計著妄想生此牒第二不實所生攝所攝計著不知自心現量及墮有無見增長外道見此牒第三妄想之體妄想習氣計著外種種義心心數妄想我我所計著生此牒第四妄之所起世尊若如是外種種義相墮有無相離性非性離見相今第二述大慧舉真俗二諦明其設並此標世諦性非有無世尊第一義亦如是離量根分譬因相今述第一義真亦非根量譬因之相世尊何故一處妄想不實義種種性計著妄想生非計著第一義處相妄想生此第三明大慧徵詰真俗二諦義稍不齊將無世尊說邪因論耶此第四正難佛說真俗兩諦墮生不生者怨非世尊說邪因論耶說一生一不生此第五釋難以佛說真俗兩諦一有妄生一即非生故墮邪論上明大慧難辭佛告大慧非妄想一生一不生次明佛答此即總非前難謂佛之自覺尚不存於真俗豈有生不生耶所以者何次徵非一生一不生者何謂有無妄想不生故三釋聖智所照尚不見真俗可得豈有生不生耶外現性非性以妄不生故了知外性本來非生覺自心現量妄想不生此明滅妄所由以覺心現故即有無二妄無所從生上總明以實相遣難大慧我說餘愚夫自心種種妄想相故事業在前種種妄想性相計著生自下方便會通謂佛前所說妄想生者但說彼愚夫自妄而起非是如來而有斯過云何愚夫得離我我所計著見離作所作因緣過此假以徵起若不說不實妄想者云何令愚離我我所等因緣之過覺自妄想心量身心轉變又云何令愚覺於心量而身心轉變耶究竟明解一切地如來自覺境界復云何令彼明解諸地入於如來自覺之境耶離五法自性事見妄想復云何令彼離五法三性對治等見由佛上說不實妄故令於愚夫離妄自覺明解諸地入佛境界離對治門獲如斯益其云何愚夫四字該下諸句文理斯顯以是因緣故我說妄想從種種不實義計著生今總結前說妄之意知如實義得解脫自種種妄想若衆生知實即能脫妄茲為利物豈佛有斯患爾時世尊欲重宣此義而說偈言諸因及與緣從此生世間下偈總十四行半此舉世間從因緣生妄想著四句不知我所通此明片也謂由妄想不了因緣空故著於四句不知如來離句自通世間非有生亦復非無生不從有無生亦非非有無此舉世間離茲四句諸因及與緣云何愚妄想此訶彼見若因緣既爾云何愚夫強生妄想非有亦非無亦復非有無如是觀世間心轉得無我今明觀益謂如是觀世離句者即執法心轉得法無我上總明緣非四句一切性不生以從緣生故明一切果性本自不生以從因緣之所生故一切緣所作所作非自有明一切果性既從緣所作故知非自有也事不自生事有二事過故夫二事之過如瓶上生瓶此明略牒無二事過故非有性可得既無二過即自性非有上之兩行破所生之果觀諸有為法離攀緣所緣無心之心量我說為心量自下總片上見若言觀諸有為離於能所復言無心可得此亦未離心量量者自性處緣性二俱離性究竟妙淨我說為心量夫量者能緣心自性即所緣境若言緣性雙離謂會真淨斯亦心量施說世諦我彼則無實事諸陰陰施設無事亦復然若謂我法二空而為究竟斯亦心量有四種平等相及因性生第三無我等第四修修者此舉四等齊真俗不二此中相者謂相無相等二因性謂因果平等第三無我者諸我無我等第四修修能所平等兼該一切妄想習氣轉有種種心生境界於外現是世俗心量由習轉心生境便外現此之心境是世俗心量外現而不有心見彼種種建立於身財我說為心量此明外現非有由心故生立彼依正亦為心量離一切諸見及離想所想無得亦無生我說為心量上破世諦心量自下明真諦亦為心量若謂離能所又復言無得無生者斯亦未超心量非性非非性性非性悉離謂彼心解脫我說為心量此行若言有無雙離謂心無縛者此亦心量如如與空際涅槃及法界種種意生身我說為心量夫如與空際涅槃法界及意生身者並約法身一相應物而施異名若尋言取著有所得者亦心量耳上偈及長行文雖異說大意破真俗二見令物會於中道爾時大慧菩薩白佛言世尊如世尊所說菩薩摩訶薩當善語義今明語義欲令依義不依於語此大慧初問引於昔說云何為菩薩善語義次請善語義之方便云何為語云何為義三徵語義之相佛告大慧諦聽諦聽善思念之當為汝說次佛答中此先飭許大慧白佛言善哉世尊唯然受教次敬受所飭佛告大慧云何為語三明廣答先釋語中此明初徵謂言字妄想和合今釋語中謂言字及妄三事和合為其語相依咽喉脣舌齒齗頰輔次依咽喉等八發生言說明其語緣因彼我言說妄想習氣三以彼我相對及久遠言習此並發語之因是名為語三總結示大慧云何為義第三釋義此亦初徵謂離一切妄想相言說相次正釋義謂離妄及言者明言語道斷心行處滅此不思議第一之義是名為義三明結示大慧菩薩摩訶薩於如是義獨一靜處聞思修慧緣自覺了向涅槃城此明修義方便習氣身轉變已自覺境界觀地地中間勝進義相謂修義獲益是名菩薩摩訶薩善義三總結示復次大慧善語義菩薩摩訶薩觀語與義非異非不異觀義與語亦復如是今明妙達語義之相此總初標若語異義者今牒異計則不因語辨義夫異則天乖義豈因語而辨此即反釋異義不成而以語入義現見世間由語入義既語義相因不可言異斯即順釋如燈照色然以語入義者如因燈而見色不可稱其異也若破不異一准於前但轉勢而已梵文之妙其在茲乎復次大慧不生不滅自性涅槃三乘一乘心自性等今舉不生滅法及三乘一乘心性平等者有其二意一明上語義不異二則片不二見斯過義該上下如緣言說義計著墮建立及誹謗此明二見謂如世凡夫緣言計義必墮立謗二邊若計言義是有者即建立所收復謂言義俱無還同誹謗此明略標見異建立異妄想此即釋也若情見言義是異即立之為異斯則妄想一亦准此可知如幻種種妄想現自下舉喻此略標譬如幻術之法及所幻人或言一異者斯則愚夫妄想所現譬如種種幻凡愚衆生作異妄想非聖賢也此廣喻也若見幻與幻事作一異見者是凡愚所知非諸賢聖譬計言義亦復如之然聖賢之人本不住於言義豈有一異同於幻耶爾時世尊欲重宣此義而說偈言彼言說妄想建立於諸法以彼建立故死墮泥犁中此明死愚妄情立法業報隨生誹謗亦爾文略不具泥犁正梵云捺落迦謂衆苦逼切此云地獄陰中無有我陰非即是我不如彼妄想亦復非無我以士計言義一異故借外計陰我例而破之一切悉有性如凡愚妄想此明縱也若一切言義悉皆有性如凡陰我者若如彼所見一切應見諦此舉相望破謂若計言義如陰我者一切外道皆應見諦然諸外道既非見諦故知執言義者亦復如之一切法無性淨穢悉無有不實如彼見亦非無所有此總順釋上二句片有下句遣無合明中道復次大慧智識相今當說下廣明知識者為令依智不依於識答上問中諸智有幾種此初標計若善分別智識相者自牒所許汝及諸菩薩則能通達智識之相舉通法益疾成阿耨多羅三藐三菩提明得果益大慧彼智有三種廣釋相中此初標數謂世間出世間出世間上上次列其數云何世間智三明徵釋此初徵世智謂一切外道凡夫計著有無次釋但愚計有無悉為世智云何出世間智次辨出世此亦先徵謂一切聲聞緣覺墮自共相希望計著次二乘之人計陰等為有云何出世間上上智將明上上此亦初徵謂諸佛菩薩觀無所有法見不生不滅離有無品明諸佛菩薩照於如實見一切法本無生滅不住有無此即上上之智泛明三種者為顯勝令修入如來地人法無我緣自得生獲佛地證二空者斯由勤修自覺之所成就大慧彼生滅者是識不生不滅者是智上明智之差別今辨智識優劣此初對可知墮相無相及墮有無種種相因是識超有無相是智次約墮二邊相悉名妄識超為正智復次長養相是識非長養相是智三明增長相見名之為識離相為智復次有三種智謂知生滅知自共相知不生不滅四明應物有異謂應凡夫故知於生滅化二乘故知自共相同菩薩故知不生滅然智唯是一而應物斯殊復次無礙相是智境界種種礙相是識五明心無障礙目之為智為境所礙此則為識中間境界二字該通上下復次三事和合生方便相是識無事方便自性相是智六明以根塵識三事和合為生識方便名之為識無三方便乃名為智復次得相是識不得相是智七明但心有所得名之為識若無所得即名為智自得聖智境界不出不入故如水中月此明智體謂自得之智本自有之性非生滅但以離妄言生妄覆謂滅如水淨月現水濁影沉而月性常爾本非出入爾時世尊欲重宣此義而說偈言採集業為識不採集為智觀察一切法通達無所有下偈有七今雙標識智兼明觀益逮得自在力是即名為慧謂心無所礙故生三界作大饒益得力自在故名為慧縛境界為心覺想生為智此標真妄謂纏縛外境此即妄心若覺念不生乃名真智無所有及勝慧則從是生此明觀益謂第八佛地無功勝慧並由覺想而生心意及與識遠離思惟想此明八地已上無生勝慧離八識思想即真實無生得無思想法佛子非聲聞又明顯勝若得無慮無察無思無想者斯則菩薩非謂二乘寂靜勝進忍如來清淨智夫言忍者通三賢十聖總分有五謂信伏順無生忍等並菩薩所行然寂靜勝進忍者即佛智清淨生於善勝義所行悉遠離明佛忍淨智從勝義諦生心想所行悉皆遠離故解深密偈云內證無相之所行不可言說絶表示息諸諍論勝義諦超過一切尋思想我有三種智聖開發真實於彼想思惟悉攝受諸性明如來為開發凡聖令悟真實示有三智其實一道若於彼正覺所思物無不攝此即如來寂靜之智二乘不相應智離諸所有明彼二乘不與佛智相應以此妙智離諸所有計著於自性從諸聲聞生然二乘所見以計著為心由此義故不應佛智超度諸心量如來智清淨超度諸心斯為佛智成上智離諸所有復次大慧外道有九種轉變論外道轉變見生今明轉變顯前識義轉變即心境二邊因緣都稱或境轉心變或心轉境變此總初標所謂形處轉變形即正報處則依報相轉變謂青黃等異及男女差別因轉變計一切法從因而生成轉變計於我所決定不壞見轉變計四句見外道所知性轉變執真妄善惡及以四大各有體性緣分明轉變計緣能顯果故曰分明所作分明轉變執果從緣生事相非謬事轉變計於一切有為之事大慧是名九種轉變見一切外道因是起有無生轉變論初標因論超見今結依見興論故見論相依俱名轉變云何形處轉變自下明釋初以例後今徵牒初變謂形處異見謂計形處各有差別此明法說譬如金變作諸器物則有種種形處顯現非金性變次舉外喻然外道計造色有變非謂性大如金造器服但所造有變而金性不易一切性變亦復如是明一切形處等變亦復如之此釋初訖或有外道作如是妄想乃至事變妄想今舉初該八者總明敘計彼非如非異自下釋破此即初標然聖人非如彼見亦復非異以即妄即真即事即理故順而不同矣妄想故然凡夫妄故不同聖人如是一切性變當知舉上九種以例諸見當知凡聖道別而真妄殊途此句該通上下如乳酪酒果等熟外道轉變妄想此舉世間妄見轉變之相以例前見謂轉乳成酪生酒為熟生果亦爾其類實多彼亦無有轉變若有若無自心現外性非性此破凡夫妄見之相大慧如是凡愚衆生自妄想修習明彼凡愚以妄熏習故作如是見上總片凡愚妄患大慧無有法若生若滅如見幻夢色生此釋上非如非異謂聖了諸法性非生滅如見幻色本無轉變爾時世尊欲重宣此義而說偈言形處時轉變四大種諸根中陰漸次生妄想非明智偈文有二此破外道小乘等見謂外計形處時節及以諸根悉皆轉變復計諸趣捨前身已中陰續生者則二乘所見最勝於緣起非如彼妄想然世間緣起如乾闥婆城此頌聖見謂佛於緣起不同凡妄了從緣法如彼乾城今舉聖見者為令悟佛知見爾時大慧菩薩復白佛言世尊唯願為說一切法相續義解脫義今舉縛解而請者然生生死涅槃等法備在其中欲令衆生逈超二見入於中道遠酬上問誰縛誰脫若善分別一切法相續不相續相將明舉益此即重牒前宗我及諸菩薩善解一切相續巧方便不墮如所說義計著相續初明通權益謂了佛方便說於相續者令離續故即內自無繫不著名言說不相續亦復如是今舉一邊者准而可知善於一切諸法相續不相續相及離言說文字妄想覺次明捨詮益既了縛解則不滯文言及以妄覺遊行一切諸佛剎土無量大衆力自在通總持之印種種變化光明照曜三明起化益謂若聞此說則能遊佛剎示衆圍繞十力自在獲於神通文義二持三空之印現諸變化放大光明覺慧善入十無盡句無方便行四明無功益也謂得佛慧妙悟十願不假方便任運而化此明法說猶如日月摩尼四大次舉七喻顯彼無功如彼日月不思而照又類如意滿願無心復地載水潤火熟風持功成不念菩薩利物亦復如是於一切地離自妄想相見見一切法如幻夢等入佛地身五明獲果益謂諸地離妄了一切法如幻夢等悟於地證彼法身於一切衆生界隨其所應而為說法而引導之上並自利今舉利他謂於衆生隨其所應說法開導悉令安住一切諸法如幻夢等離有無品及生滅妄想異言說義其身轉勝復令彼安住如幻夢等及離有無生滅妄想又令不著言義證會法身轉加殊勝佛告大慧善哉善哉諦聽諦聽善思念之當為汝說下明佛答先讚飭許說大慧白佛言唯然受教大慧敬飭佛告大慧無量一切諸法如所說義計著相續自下廣答明諸衆生於一切法隨說而計起相續見此即總標所謂相計著相續次明列也謂見聞於相而起相續緣計著相續謂於緣念著性非性計著相續聞於有無而生計著生不生妄想計著相續聞世諦有生真諦不生起相續見滅不滅妄想計著相續又聞不善有滅善法不滅隨說而計起相續見乘非乘妄想計著相續又聞乘及非乘而生計著有為無為妄想計著相續又聞凡境有為聖境無為而生計著地地自相妄想計著相續又聞諸地執有體相自妄想無聞妄想計著相續又以久遠妄習計著見故有無品外道依妄想計著相續又計有無等見為外道依起於相續三乘一乘無聞妄想計著相續又聞說三乘一乘起推實見大慧此及餘凡愚衆生自妄想相續三明總結此者即前文所列餘乃泛該並是凡愚自心妄見以此相續故凡愚妄想以斯相續愚妄因此而生上總法說如蠶作繭次明舉喻以妄想絲自纏纏他有無有相續相計著今明法說謂三界凡愚更相纏縛以二見絲甚於彼蠶大慧彼中亦無相續及不相續相上並牒計今明正解此則初文一謂彼前所計本無縛解二者於第一義亦無二相可存義勢兩兼括囊備矣見一切法寂靜妄想不生故此明釋也由見寂無妄故縛解非有菩薩摩訶薩見一切法寂靜此舉見寂之人謂諸菩薩此句義該上下復次大慧覺外性非性自心現相無所有明前菩薩覺外無性故心現本無隨順觀察自心現量有無一切性無相今明了性所由以此菩薩隨順證入本心現前即知有無二邊一切諸性悉皆無相見相續寂靜故外無性者由見相續悉皆寂靜故此句該通上下於一切法無相續不相續相此明總結大慧彼無有若縛若解餘墮不如實覺知有續有解此第二雙標凡聖二見以彼聖人悟如實故本無縛解諸餘凡夫墮不如實見有縛解所以者何此句所徵義通凡聖謂於一切法有無有無衆生可得故此雙釋二見若釋聖見者即言謂於一切法有及無有皆悉是無又無衆生可得以無一字該括上下明人法俱非此明聖見又釋凡見者即言謂於一切法有無此之有無是衆生可得以有無二字該於上下此釋凡夫墮不如實兩釋同用一文斯亦梵言之妙復次大慧愚夫有三相續第三約就三毒明續即不續此初約人標數謂貪恚癡及愛未來有喜愛俱次釋謂愚夫以三毒愛故必獲來報亦報亦有喜愛與身俱起以此相續故有趣相續以三毒不斷故三有五趣相續受生彼相續者續五趣此重釋也以彼三毒相續故續於五趣上總敘見大慧相續斷者無有相續不相續相次即破也謂了於如實三毒相續既亡則縛解俱淨復次大慧三和合緣作方便計著識相續無間生四約三緣以明三脫謂根塵識等三緣方便令業識續生方便計著則有相續次明招果謂以三緣方便計著故則有趣續生上總敘計三和合緣識斷見三解脫一切相續不生此亦破也謂了塵無相根性自空識無所願斯即三脫相續從何而起爾時世尊欲重宣此義而說偈言不真實妄想是說相續相此明不真故妄說為相續若知彼真實相續網則斷若知真實相續不生於諸性無知隨言說攝受若於法無知隨言而攝譬如彼蠶蟲結網而自纏頌上喻文愚夫妄想縛相續不觀察明愚為妄縛由不觀察大慧復白佛言如世尊所說以彼彼妄想妄想彼彼性自下斷蕳由前佛說縛解俱妄今將設難故此牒之謂上十一種縛解更迭相望故云彼彼以不實故稱為妄想又妄想即計有彼縛解等性非有彼自性但妄想自性耳又世尊所說非有彼縛解之自性但妄執有自性耳上並大慧牒佛所說大慧白佛言若但妄想自性非性自性相待者次明定宗若言縛解但唯妄想非有自性可相待者非為世尊如是說煩惱清淨無性過耶三正難也豈非佛說生死涅槃二俱無體墮空見過耶一切法妄想自性非性故四釋成難意以佛上說縛解等性一切諸法由妄計有本無性故佛告大慧如是如是如汝所說今明佛答但以印述前難便為答文謂我實言生死涅槃縛解等性一切皆空空即是理理又非無何斷之有大慧非如愚夫性自性妄想真實此成上即述空義謂非彼愚夫妄情執實故遣有言空若心無結滯則無可空矣此妄想自性非有性自性相今重非情見謂此縛解但由凡夫妄想自性其實非有然大慧如聖智有性自性聖知聖見聖慧眼如是性自性知上遣有言空今說真片斷既離情執而真照自明不同凡惑故云聖智有性慧眼所知大慧白佛言若使如聖以聖知聖見聖慧眼非天眼非肉眼性自性如是知以佛上明遣斷言真恐聞斯說便生有見所以大慧取物情疑將欲託佛興難故斯牒也非如愚夫妄想以佛說真是聖知似存於物故大慧下申五難並依前而起今即是初凡聖各別難中此即定辭謂若真是聖知非如愚夫天肉眼等所知見者世尊云何愚夫離是妄想次正明徵難謂若如上說真但聖知者而諸愚夫云何依真捨妄不覺聖性事故第三結難亦名釋也以聖性之事非愚覺故世尊彼亦非顛倒非不顛倒第二明凡境非倒難既真若非凡即彼凡夫非倒不倒之二見以凡不入聖即不翻真故此雙非又明標述所以者何次徵凡夫非倒不倒者何謂不覺聖事性自性故三釋所以謂聖境非凡所覺故亦不翻真起妄此釋彼凡非是顛倒不見離有無相故二明聖智離有無相既非凡夫所知見者此成上非見不倒世尊聖亦不如是見如事妄想不以自相境界為境界故第三明聖同凡倒難中此初雙標亦是縱辭謂聖既有真豈不如凡夫計事執境存乎物耶世尊彼亦性自性相妄想自性如是現不說因次縱牒也謂聖若如凡妄執而現又不說真之所以者無因故第三一句總難明聖人真境墮於無因之患謂墮性相見故四釋無因所由謂外道計微塵等性不從因生世尊若爾即墮斯見異境界非如彼等如是無窮過五正釋聖同凡倒謂凡乖聖道過乃無窮若聖異於凡亦應如是世尊不覺性自性相故六總結也以佛說聖境非凡夫所覺故世尊亦非妄想自性因性自性相彼云何妄想此第四凡境非妄難也既聖境非凡即不因聖何得稱彼凡夫獨為妄想耶此即初標非妄想如實知妄想次釋凡夫非妄但聖悟如實知我凡夫以為妄故世尊妄想異自性相異三舉二事設並謂妄異於真真異於妄此約真俗有殊明凡夫非妄世尊不相似因妄想自性相次舉二因各別復明凡境非妄謂凡以妄想為因聖以真實自性相為因兩因既殊故凡非妄彼云何各各不妄想愚夫不如實四明訶詰若二諦既殊何故聖人各各不妄愚不如實此責倒不齊然為衆生離妄想故說如妄想相不如實有五明結也由聖人欲令凡離於妄遂言凡夫之妄非是實有然我凡夫實非妄也世尊何故遮衆生有無有見事自性計著此第五聖墮有無難此即初標責聖遮凡謂佛以何故遮彼凡夫起有無二見聖智所行境界計著墮有見說空法非性次明舉聖同凡謂上文說有聖智可計此即墮有復說縛解非性斯亦墮空而說聖智自性事三明結也又佛自兩說不同皆言是我聖智利益法門上來雖明五難大意只在空有二邊佛告大慧非我說空法非性亦不墮有見第二明如來廣答明佛之所說不墮空有二邊此總非前難說聖智自性事然為令衆生離恐怖句故自下會釋明佛雖說有不乖於空然恐怖空斷不能起修為說聖智此約理而談豈存於有衆生無始已來計著性自性相聖智事自性計著相見說空法次明說空未乖於有以衆生久習力故聞說縛解不了聖智權巧便生計著故說於空斯乃遣有何空之有大慧我不說性自性此明總結佛不說空有之自性然上總明方便會通大慧但我住自得如實空法離或亂相見此約實開釋明證如實空離彼有無惑亂相見今舉佛之知見者欲令一切衆生踐如來跡故離自心現性非性見性與非性即成前所離惑亂相見得三解脫如實印所印謂佛之所得離妄如實一心三空祕密之印執改持信無罣㝵故於性自性得緣自覺觀察住離有無事見相獲實印故於法界自性緣內心觀察而住有無事見悉皆遠離圓滿復悟衆生此舉前佛陀之義此乃梵漢互明佛告大慧恣所欲問我當為汝隨所問說佛將開演先恣許也大慧白佛言世尊如來應供等正覺為作邪為不作邪自下大慧再請今初問也謂牒上佛陀之義法身異名十號之三數所謂乘一如道來到大智破於結賊齊正覺者為從造作為非作邪此初對問為事邪佛告大慧如來應供等正覺於如是等辭句非事非因自下佛答對問總非既非事因例餘可見所以者何次明徵也俱有過故三總斥上問非獨事因欲明餘句斯過大慧若如來是事者四廣釋破中此初牒事或作或無常次正明釋若佛是事者或同作法或墮無常此即順釋無常故一切事應是如來此縱詞既同造作一切世間果事應是如來我及諸佛皆所不欲此訶質也自我釋迦及以諸佛皆不欲以無常之事而為如來若非所作者次破因非所作此亦初牒無所得故方便則空夫不作之法皆無所得若爾者佛之妙用斯則徒施次明釋也同於兔角槃大之子三明舉斯二喻顯有名無實以無所有故四結也以同無所有故大慧若無事無因者則非有非無上明別破今則雙非既非事因豈滯有無之境若非有非無則出於四句既非有無則超於四句四句者是世間言說若出四句者則不墮四句夫墮句者名曰世間若不墮四句乃名為出不墮四句故智者所取離句之法智人所證一切如來句義亦如是慧者當知明諸佛三身性非四句有智慧者當如是知上明諸佛三身離句之義勸令證知如我所說一切法無我當知此義無我性此引昔以證今如佛昔說諸法無我當知即是法身離句之義是無我一切法有自性無他性自下釋其無我以顯法身言無我者但有空之自性無妄見有無之他性如牛馬此略標喻大慧譬如非牛馬性馬牛性其實非有非無此正喻也譬如一馬本非是牛以目遠望謂之為牛近覩即非而此牛相實非有無彼非無自相謂彼非無馬之自體上並喻說如是大慧一切諸法非無自相有自相自下法合謂一切諸法性非有無中間非之一字雙貫二自合上牛非有無但非無我愚夫之所能知明離有無法非是無我二乘愚夫外道之所能知以妄想故明此二人俱未離妄故如是一切法空無生無自性當如是知此勸了諸法空無生無自性者合前馬也此法空之理超過有無即法身之性如是如來與陰非異非不異自下歷別破見重明三身性非一異今約陰以明此即初標若不異陰者應是無常次別牒破也謂人見陰是無常若如來同陰亦應無常此縱破也若異者方便則空世人見異陰之外則無所有今言如來異陰者何有悲智自他兼利方便之用故言空也若二者應有異今第三牒二見而破若謂如來與陰是二法者應有於異及不異也今但舉一邊觀下文可見如牛角相似此文觀察有為法非無因有因彼生滅論者所見從是滅上既破有無二因故此雙非顯益云何為無生為是無性邪上總破外見自下明真實無生即頌上長行謂何者無生為無性邪為顧視諸緣有法名無上頌上為待緣故有此無生邪名不應無義唯為分別說此頌上若名字有法唯願為說非無性無生亦非顧諸備收相者不實相妄想故我我所然二我之相即體斯妄五法之中名相妄想攝也二攝受滅二無我生以其智如攝二無我是故大慧此五法者聲聞緣覺菩薩如來自覺聖智諸地相續次第一切佛法悉入其中非但五法攝三及佛三乘所修聖智諸地行位乃至三世佛法括在其中復次大慧五法者自下再明五法此總標牒相名妄想如如正智次列名中稍似非次前舉未顯本今舉本攝末示五法之功又破物情所執故大慧相者三明廣釋此先辨相若處所形相色像等現是名為相夫形質體分總名為相朕以萬機之暇披覽典籍全身延命安民存業者經史之中釋教最上由是仰憑三寶歸一乘敬寫一切經卷軸已訖讀之者以至誠心上為國家下及生類乞索百年祈禱萬福聞之者無量劫間不墮惡趣遠離此網俱登彼岸右聖武帝願文也可觀為國家祈福之盛意矣又按慶安手鑑暨耳比磨利帖共載聖武天皇宸翰世謂之大聖武蓋以字體大於常也此注楞伽經筆力遒徑鳳翥龍躍自有天人步虛之勢所謂大聖武者也不勝激賞裝潢以十襲寶重焉明治十年十月念五日大教正華頂山第七十五世順徹定識
