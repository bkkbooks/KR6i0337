body:
  text: 迦葉拘留孫拘那含是我一百一問以世間見現在釋迦與過去三佛有異將明化跡有殊而德體無二此會權歸下四等廣明何故說斷常及與我無我一百二問佛以何故說斷常及我無我何不一切時演說真實義一百三問何故不說真實義邪而復為眾生分別說心量一百四問復以何故說於心量何因男女林訶梨阿摩勒一百五問世間果實何故不同有巨而味甘復有形如男女具如立世毗曇論明雞羅及鐵圍金剛等諸山一百六問按梵李雞羅婆山及鐵圍金剛山等並以何差別此十山之數仙聖所居今略舉三意該餘七無量寶莊嚴一百七問此等諸山以何土石所致及眾寶而成仙闥婆充滿一百八問闥婆者諸天樂神之稱居在地上寶山之中若天須樂輙身現異相便即昇天作樂事訖還其本處以此闥婆及仙人等多止寶山故云充滿上四十八偈半並大慧所陳百八義問無上世間解聞彼所說偈大乘諸度門諸佛心第一自下四十行偈佛牒上問明略答訶片及問有不周如來教問此之一行即結集生起謂佛聞前問意請大乘度門佛心勝義故云第一下三十九偈並佛之所說善哉善哉問此上所問含諸佛心義在益既弘故斯重讚大慧善諦聽將示深義故先飭聽我今當次第如汝所問說次明許說問觀下文非次何故兩處言次第邪夫生為念本下既牒生即不生此義之次也亦欲片問非次生及與不生涅槃空剎那初句舉生即不生次句牒上之三問趣至無自性此句總答上問兼該上下趣即是心至即為境心境既無自性餘法准而可知佛諸波羅蜜佛子與聲聞緣覺諸外道及與無色行如是種種事此牒佛與三乘能脩行人波羅蜜即所行之法諸外道謂人無色行即法此總舉內外人法及餘種種悉皆無性上之三行總明略答須彌巨海山洲渚剎土地此下八行明牒問訶責此之二句牒上云何名為地星宿及日月外道天脩羅此牒上星宿日月天諸外道脩羅上問中無因而附出少類天耳解脫自在通力禪三摩提牒上何因神通及自在三昧滅及如意足覺支及道品上句初滅義牒四勤及四如意足覺支一句正牒上何因說覺支及與菩提分諸禪定無量諸陰身往來上句義牒四禪四無量下句牒上眾生生諸趣正受滅盡定三昧起心說牒上云何無色定滅正受明須彌巨海乃至滅定三昧並是牒問唯起心說以為略片心意及與識無我法有五牒上云何名為藏意及識何等二無我兼義牒五法一門自性想所想及與現二見義牒三性兼牒自性及與心云何作有見乘及諸種性金銀摩尼等牒上云何三乘及種性誰生諸寶性等三問一闡提大種荒乱及一佛牒上云何闡提國土乱何大牟尼等三問其大種因而附出智爾𦦨得向眾生有無有牒上爾𦦨淨解脫脩行者二問其眾生有無有一句此即片辭明上之所問並是眾生有無二見象馬諸禽獸云何而捕取牒上云何象馬鹿一問譬因成悉檀及與作所作牒上悉檀及緣起何所生作所作二問叢林迷惑通心量不現有牒上見癡惑一問其心量不現有一句即是片辭明上之所問但唯心量實無有法而可現也此該上下諸地不相去百變百無受牒上何因度諸地及百變易百無受等二問醫方工巧論技術諸明處牒上云何醫方論明處及技術等二問並心量耳有何現邪諸山須彌地巨海日月量下中上眾生身各幾微塵自下九行半以大慧問有不周佛教重問者略有二義一為遣物情外二以大慧上既言我名大慧通達大乘者且如妙高及四洲土地大海日月下中上身此等形量各用幾塵而成知其數不若不知者豈曰大乘又諸物既積微所
